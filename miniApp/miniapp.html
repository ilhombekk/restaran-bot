<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajabo Burger</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #7B3F00;
            --primary-dark: #5C2E00;
            --primary-light: #A0522D;
            --accent: #FF6B35;
            --accent-light: #FF8C5A;
            --bg: #FDF6EE;
            --bg2: #F5EBD8;
            --card: #FFFFFF;
            --text: #2C1A0E;
            --text2: #7A5C44;
            --text3: #B08060;
            --border: #EDD9C0;
            --success: #2E7D32;
            --radius: 20px;
            --shadow: 0 4px 24px rgba(123,63,0,0.10);
            --shadow-lg: 0 8px 40px rgba(123,63,0,0.18);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
            padding: 20px 16px 28px;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -20px; left: 20px;
            width: 80px; height: 80px;
            background: rgba(255,107,53,0.15);
            border-radius: 50%;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 42px; height: 42px;
            background: var(--accent);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 12px rgba(255,107,53,0.4);
        }
        .logo-text {
            font-family: 'Playfair Display', serif;
            color: #fff;
            font-size: 20px;
            font-weight: 900;
            line-height: 1.1;
        }
        .logo-sub {
            color: rgba(255,255,255,0.65);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .cart-btn {
            position: relative;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 14px;
            width: 46px; height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .cart-btn:active { transform: scale(0.93); }
        .cart-badge {
            position: absolute;
            top: -4px; right: -4px;
            background: var(--accent);
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            width: 20px; height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            display: none;
            box-shadow: 0 2px 8px rgba(255,107,53,0.5);
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 10px 14px;
            backdrop-filter: blur(10px);
        }
        .search-box input {
            background: none;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.55); }
        .search-icon { font-size: 16px; opacity: 0.7; }
        
        /* ===== CATEGORIES ===== */
        .categories-wrap {
            padding: 16px 0 4px;
            background: var(--card);
            box-shadow: 0 2px 12px rgba(123,63,0,0.06);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 0 16px;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }
        .cat-chip {
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: 999px;
            border: 2px solid var(--border);
            background: transparent;
            color: var(--text2);
            font-family: 'Nunito', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .cat-chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(123,63,0,0.25);
        }
        
        /* ===== MAIN CONTENT ===== */
        .main {
            padding: 16px;
            padding-bottom: 120px;
        }
        
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 14px;
            margin-top: 8px;
        }
        
        /* ===== PRODUCT GRID ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .product-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1.5px solid var(--border);
            position: relative;
        }
        .product-card:active { transform: scale(0.97); }
        
        .product-img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            background: linear-gradient(135deg, var(--bg2), var(--border));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .product-info {
            padding: 10px 12px 12px;
        }
        .product-name {
            font-size: 13px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 6px;
        }
        .product-price {
            font-size: 15px;
            font-weight: 800;
            color: var(--primary);
        }
        
        .product-qty {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            background: var(--bg2);
            border-radius: 12px;
            padding: 4px;
        }
        .qty-btn {
            width: 30px; height: 30px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
        }
        .qty-btn:active { transform: scale(0.88); }
        .qty-btn.minus { background: var(--border); color: var(--text2); }
        .qty-num {
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
            min-width: 24px;
            text-align: center;
        }
        
        .add-btn {
            width: 100%;
            margin-top: 8px;
            padding: 9px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .add-btn:active { transform: scale(0.97); background: var(--primary-dark); }
        
        /* ===== BOTTOM CART BAR ===== */
        .cart-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--primary-dark);
            padding: 14px 16px;
            padding-bottom: calc(14px + env(safe-area-inset-bottom));
            display: none;
            z-index: 50;
            box-shadow: 0 -4px 24px rgba(92,46,0,0.3);
        }
        .cart-bar.visible { display: block; }
        .cart-bar-btn {
            width: 100%;
            padding: 14px 20px;
            border-radius: 16px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(255,107,53,0.4);
        }
        .cart-bar-btn:active { transform: scale(0.98); }
        .cart-bar-left { display: flex; align-items: center; gap: 10px; }
        .cart-count-badge {
            background: rgba(255,255,255,0.25);
            border-radius: 8px;
            padding: 3px 8px;
            font-size: 14px;
            font-weight: 800;
        }
        
        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(44,26,14,0.6);
            z-index: 100;
            display: none;
            align-items: flex-end;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg);
            border-radius: 28px 28px 0 0;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 20px 16px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-handle {
            width: 40px; height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 20px;
        }
        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
        }
        
        /* ===== CART ITEMS ===== */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .cart-item-img {
            width: 56px; height: 56px;
            border-radius: 14px;
            background: var(--bg2);
            object-fit: cover;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item-info { flex: 1; min-width: 0; }
        .cart-item-name { font-size: 14px; font-weight: 700; color: var(--text); }
        .cart-item-price { font-size: 13px; color: var(--text3); margin-top: 2px; }
        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg2);
            border-radius: 12px;
            padding: 4px 6px;
        }
        .cart-item-total { font-size: 15px; font-weight: 800; color: var(--primary); white-space: nowrap; }
        
        .cart-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 8px;
        }
        .cart-total-label { font-size: 16px; font-weight: 700; color: var(--text2); }
        .cart-total-amount {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        
        /* ===== ORDER FORM ===== */
        .form-section { margin-top: 16px; }
        .form-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text2);
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .option-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .option-btn {
            padding: 12px;
            border-radius: 14px;
            border: 2px solid var(--border);
            background: var(--card);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .option-btn.active {
            border-color: var(--primary);
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
        }
        .option-btn .opt-icon { font-size: 22px; display: block; margin-bottom: 4px; }
        .option-btn .opt-label { font-size: 13px; font-weight: 700; }
        .option-btn .opt-sub { font-size: 11px; opacity: 0.7; margin-top: 2px; }
        
        .address-input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 2px solid var(--border);
            background: var(--card);
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            outline: none;
            resize: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }
        .address-input:focus { border-color: var(--primary); }
        
        .order-btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 20px rgba(123,63,0,0.35);
            margin-top: 4px;
        }
        .order-btn:active { transform: scale(0.98); }
        .order-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* ===== SUCCESS ===== */
        .success-screen {
            text-align: center;
            padding: 24px 0;
        }
        .success-icon {
            font-size: 64px;
            display: block;
            margin-bottom: 16px;
            animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes bounceIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .success-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }
        .success-sub { color: var(--text2); font-size: 14px; line-height: 1.6; }
        .success-id {
            display: inline-block;
            margin-top: 16px;
            padding: 8px 20px;
            background: var(--bg2);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 800;
            color: var(--primary);
        }
        
        /* ===== EMPTY ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text3);
        }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 15px; font-weight: 600; }
        
        /* ===== LOADING ===== */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 16px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text);
            color: #fff;
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
            white-space: nowrap;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        .divider {
            height: 1px;
            background: var(--border);
            margin: 12px 0;
        }
    </style>
</head>
<body>
    
    <!-- HEADER -->
    <div class="header">
        <div class="header-top">
            <div class="logo">
                <div class="logo-icon">🍔</div>
                <div>
                    <div class="logo-text">Ajabo Burger</div>
                    <div class="logo-sub">Tez yetkazib berish</div>
                </div>
            </div>
            <button class="cart-btn" onclick="openCart()">
                🛒
                <span class="cart-badge" id="cartBadge">0</span>
            </button>
        </div>
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Mahsulot qidirish..." id="searchInput" oninput="filterProducts()">
        </div>
    </div>
    
    <!-- CATEGORIES -->
    <div class="categories-wrap">
        <div class="categories" id="categoriesRow"></div>
    </div>
    
    <!-- MAIN -->
    <div class="main" id="mainContent">
        <div class="loading">
            <div class="spinner"></div>
            <p style="color:var(--text3);font-weight:700;">Menyu yuklanmoqda...</p>
        </div>
    </div>
    
    <!-- BOTTOM CART BAR -->
    <div class="cart-bar" id="cartBar">
        <button class="cart-bar-btn" onclick="openCart()">
            <div class="cart-bar-left">
                <span class="cart-count-badge" id="cartCountBar">0</span>
                <span>Savatni ko'rish</span>
            </div>
            <span id="cartTotalBar">0 so'm</span>
        </button>
    </div>
    
    <!-- TOAST -->
    <div class="toast" id="toast"></div>
    
    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
        <div class="modal" id="modal">
            <div class="modal-handle"></div>
            <div id="modalContent"></div>
        </div>
    </div>
    
    <script>
        const API = 'https://restaran-bot-1.onrender.com/api';
        const DELIVERY_FEE = 12000; // Yetkazib berish narxi
        
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#5C2E00');
        }
        
        let allProducts = [];
        let cart = {}; // { key: qty }
        let activeCategory = 'all';
        let searchQuery = '';
        
        // ===== FORMAT =====
        function formatPrice(n) {
            return new Intl.NumberFormat('uz-UZ').format(Number(n || 0)) + " so'm";
        }
        
        // ===== LOAD MENU =====
        async function loadMenu() {
            try {
                const res = await fetch(`${API}/menu`);
                const data = await res.json();
                allProducts = Object.values(data || {}).filter(p => p.active);
                renderCategories();
                renderProducts();
            } catch (e) {
                document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">😔</div>
        <p>Menyu yuklanmadi.<br>Qaytadan urinib ko'ring.</p>
      </div>`;
            }
        }
        
        // ===== CATEGORIES =====
        function renderCategories() {
            const categories = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
            const row = document.getElementById('categoriesRow');
            row.innerHTML = `<button class="cat-chip ${activeCategory==='all'?'active':''}" onclick="selectCategory('all')">Hammasi</button>`;
            categories.forEach(cat => {
                row.innerHTML += `<button class="cat-chip ${activeCategory===cat?'active':''}" onclick="selectCategory('${cat}')">${cat}</button>`;
            });
        }
        
        function selectCategory(cat) {
            activeCategory = cat;
            renderCategories();
            renderProducts();
            document.querySelector('.main').scrollTop = 0;
        }
        
        // ===== PRODUCTS =====
        function filterProducts() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase();
            renderProducts();
        }
        
        function renderProducts() {
            const filtered = allProducts.filter(p => {
                const matchCat = activeCategory === 'all' || p.category === activeCategory;
                const matchSearch = !searchQuery || p.name.toLowerCase().includes(searchQuery);
                return matchCat && matchSearch;
            });
            
            const main = document.getElementById('mainContent');
            
            if (!filtered.length) {
                main.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>Mahsulot topilmadi</p></div>`;
                return;
            }
            
            // Group by category
            const groups = {};
            filtered.forEach(p => {
                if (!groups[p.category]) groups[p.category] = [];
                groups[p.category].push(p);
            });
            
            let html = '';
            Object.entries(groups).forEach(([cat, items]) => {
                html += `<div class="section-title">${cat}</div><div class="products-grid">`;
                    items.forEach(p => { html += productCard(p); });
                    html += `</div>`;
                });
                
                main.innerHTML = html;
            }
            
            function productCard(p) {
                const qty = cart[p.key] || 0;
                const imgContent = p.image
                ? `<img src="${p.image}" alt="${p.name}" onerror="this.style.display='none'">`
                : `🍔`;
                
                return `
    <div class="product-card" id="card_${p.key}">
      <div class="product-img">${imgContent}</div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-price">${formatPrice(p.price)}</div>
        ${qty > 0 ? `
          <div class="product-qty">
            <button class="qty-btn minus" onclick="changeQty('${p.key}',-1)">−</button>
            <span class="qty-num">${qty}</span>
            <button class="qty-btn" onclick="changeQty('${p.key}',1)">+</button>
          </div>
        ` : `
          <button class="add-btn" onclick="changeQty('${p.key}',1)">
            <span>+</span> Qo'shish
          </button>
        `}
      </div>
    </div>`;
            }
            
            // ===== CART =====
            function changeQty(key, delta) {
                const current = cart[key] || 0;
                const next = Math.max(0, current + delta);
                if (next === 0) delete cart[key];
                else cart[key] = next;
                updateCartUI();
                // Re-render just that card
                const product = allProducts.find(p => p.key === key);
                if (product) {
                    const cardEl = document.getElementById(`card_${key}`);
                    if (cardEl) {
                        const qty = cart[key] || 0;
                        const imgContent = product.image
                        ? `<img src="${product.image}" alt="${product.name}" onerror="this.style.display='none'">`
                        : `🍔`;
                        cardEl.innerHTML = `
        <div class="product-img">${imgContent}</div>
        <div class="product-info">
          <div class="product-name">${product.name}</div>
          <div class="product-price">${formatPrice(product.price)}</div>
          ${qty > 0 ? `
            <div class="product-qty">
              <button class="qty-btn minus" onclick="changeQty('${product.key}',-1)">−</button>
              <span class="qty-num">${qty}</span>
              <button class="qty-btn" onclick="changeQty('${product.key}',1)">+</button>
            </div>
          ` : `
            <button class="add-btn" onclick="changeQty('${product.key}',1)">
              <span>+</span> Qo'shish
            </button>
          `}
        </div>`;
                    }
                }
                if (delta > 0) showToast('Savatga qo\'shildi ✓');
            }
            
            function getCartItems() {
                return Object.entries(cart).map(([key, qty]) => {
                    const p = allProducts.find(x => x.key === key);
                    return p ? { ...p, qty, total: p.price * qty } : null;
                }).filter(Boolean);
            }
            
            function getCartTotal() {
                return getCartItems().reduce((sum, i) => sum + i.total, 0);
            }
            
            function getDeliveryFee() {
                return deliveryType === 'delivery' ? DELIVERY_FEE : 0;
            }
            
            function getTotalWithDelivery() {
                return getCartTotal() + getDeliveryFee();
            }
            
            function getCartCount() {
                return Object.values(cart).reduce((sum, q) => sum + q, 0);
            }
            
            function updateCartUI() {
                const count = getCartCount();
                const total = getCartTotal();
                
                // Badge
                const badge = document.getElementById('cartBadge');
                if (count > 0) { badge.style.display = 'flex'; badge.textContent = count; }
                else { badge.style.display = 'none'; }
                
                // Bottom bar
                const bar = document.getElementById('cartBar');
                if (count > 0) {
                    bar.classList.add('visible');
                    document.getElementById('cartCountBar').textContent = count + ' ta';
                    document.getElementById('cartTotalBar').textContent = formatPrice(total);
                } else {
                    bar.classList.remove('visible');
                }
            }
            
            // ===== MODAL =====
            function openModal(content) {
                document.getElementById('modalContent').innerHTML = content;
                document.getElementById('modalOverlay').classList.add('open');
            }
            
            function closeModal() {
                document.getElementById('modalOverlay').classList.remove('open');
            }
            
            function handleOverlayClick(e) {
                if (e.target === document.getElementById('modalOverlay')) closeModal();
            }
            
            // ===== CART MODAL =====
            let deliveryType = 'delivery';
            let paymentMethod = 'cash';
            
            function openCart() {
                const items = getCartItems();
                if (!items.length) return showToast('Savat bo\'sh');
                
                const itemsHtml = items.map(item => `
    <div class="cart-item">
      <div class="cart-item-img">
        ${item.image ? `<img src="${item.image}" alt="${item.name}" onerror="this.style.display='none'">` : '🍔'}
      </div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${formatPrice(item.price)} × ${item.qty}</div>
      </div>
      <div class="cart-item-qty">
        <button class="qty-btn minus" style="width:26px;height:26px;font-size:15px" onclick="changeQty('${item.key}',-1);openCart()">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" style="width:26px;height:26px;font-size:15px" onclick="changeQty('${item.key}',1);openCart()">+</button>
      </div>
    </div>
  `).join('');
                
                openModal(`
    <div class="modal-title">🛒 Savat</div>
    ${itemsHtml}
    <div class="cart-total-row" style="flex-direction:column;align-items:flex-start;gap:4px">
      <div style="display:flex;justify-content:space-between;width:100%">
        <span style="font-size:14px;color:var(--text2)">Mahsulotlar:</span>
        <span style="font-size:14px;font-weight:700">${formatPrice(getCartTotal())}</span>
      </div>
      ${deliveryType === 'delivery' ? `
      <div style="display:flex;justify-content:space-between;width:100%">
        <span style="font-size:14px;color:var(--text2)">Yetkazib berish:</span>
        <span style="font-size:14px;font-weight:700;color:var(--accent)">${formatPrice(DELIVERY_FEE)}</span>
      </div>` : ''}
      <div style="display:flex;justify-content:space-between;width:100%;margin-top:4px;padding-top:8px;border-top:1px solid var(--border)">
        <span class="cart-total-label">Jami:</span>
        <span class="cart-total-amount">${formatPrice(getTotalWithDelivery())}</span>
      </div>
    </div>
    <div class="divider"></div>

    <div class="form-section">
      <span class="form-label">Yetkazish turi</span>
      <div class="option-group">
        <div class="option-btn ${deliveryType==='delivery'?'active':''}" onclick="setDelivery('delivery')">
          <span class="opt-icon">🚚</span>
          <div class="opt-label">Yetkazib berish</div>
          <div class="opt-sub">Eshikkacha</div>
        </div>
        <div class="option-btn ${deliveryType==='pickup'?'active':''}" onclick="setDelivery('pickup')">
          <span class="opt-icon">🏃</span>
          <div class="opt-label">O'zim olaman</div>
          <div class="opt-sub">Restorandan</div>
        </div>
      </div>

      <span class="form-label">To'lov usuli</span>
      <div class="option-group">
        <div class="option-btn ${paymentMethod==='cash'?'active':''}" onclick="setPayment('cash')">
          <span class="opt-icon">💵</span>
          <div class="opt-label">Naqd</div>
          <div class="opt-sub">Yetkazishda</div>
        </div>
        <div class="option-btn ${paymentMethod==='click'?'active':''}" onclick="setPayment('click')">
          <span class="opt-icon">💳</span>
          <div class="opt-label">Click</div>
          <div class="opt-sub">Onlayn</div>
        </div>
      </div>

      <div id="addressSection" style="${deliveryType==='delivery'?'':'display:none'}">
        <span class="form-label">Manzil</span>
        <textarea class="address-input" id="addressInput" rows="2" placeholder="Ko'cha, uy raqami..."></textarea>
      </div>

      <button class="order-btn" onclick="submitOrder()" id="orderBtn">
        Buyurtma berish — ${formatPrice(getTotalWithDelivery())}
      </button>
    </div>
  `);
            }
            
            function setDelivery(type) {
                deliveryType = type;
                openCart();
            }
            
            function setPayment(method) {
                paymentMethod = method;
                openCart();
            }
            
            // ===== SUBMIT ORDER =====
            async function submitOrder() {
                const items = getCartItems();
                if (!items.length) return;
                
                const address = document.getElementById('addressInput')?.value?.trim() || '';
                if (deliveryType === 'delivery' && !address) {
                    showToast('Manzilni kiriting');
                    document.getElementById('addressInput')?.focus();
                    return;
                }
                
                const btn = document.getElementById('orderBtn');
                btn.disabled = true;
                btn.textContent = 'Yuklanmoqda...';
                
                // Cart text yasash
                const cartText = '🛒 Savat:\n\n' + items.map(i => `${i.name} x ${i.qty} = ${formatPrice(i.total)}`).join('\n');
                
                const user = tg?.initDataUnsafe?.user;
                const orderId = Date.now().toString().slice(-6);
                
                const order = {
                    id: orderId,
                    name: user ? `${user.first_name || ''} ${user.last_name || ''}`.trim() || 'Mini App' : 'Mini App',
                    phone: '',
                    username: user?.username || '',
                    telegramName: user ? `${user.first_name || ''}`.trim() : 'Mini App',
                    userId: user?.id || 0,
                    chatId: user?.id || 0,
                    deliveryType,
                    paymentMethod,
                    paymentStatus: 'pending',
                    paidAt: null,
                    clickTransactionId: null,
                    location: deliveryType === 'delivery' ? { text: address } : { text: "O'zi olib ketadi" },
                    cart: Object.fromEntries(items.map(i => [i.key, i.qty])),
                    cartText,
                    subtotal: getCartTotal(),
                    deliveryFee: getDeliveryFee(),
                    total: getTotalWithDelivery(),
                    status: 'Yangi buyurtma',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString(),
                    adminMessageId: null,
                    adminLocationMessageId: null,
                    source: 'miniapp',
                };
                
                try {
                    const res = await fetch(`${API}/orders`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(order),
                    });
                    
                    if (!res.ok) throw new Error('Server xato');
                    
                    // Success
                    // Jami ni cart tozalanishidan oldin saqlash
                    const finalTotal = getTotalWithDelivery();
                    const finalDeliveryFee = getDeliveryFee();
                    const finalDeliveryType = deliveryType;
                    const finalPaymentMethod = paymentMethod;
                    
                    cart = {};
                    updateCartUI();
                    
                    document.getElementById('modalContent').innerHTML = `
      <div class="success-screen">
        <span class="success-icon">🎉</span>
        <div class="success-title">Buyurtma qabul qilindi!</div>
        <div class="success-sub">
          Tez orada sizga xabar yuboramiz.<br>
          ${finalPaymentMethod === 'click'
                    ? "Click to'lovi uchun bot orqali invoice yuboriladi."
                    : finalDeliveryType === 'pickup'
                    ? "Olib ketishda naqd to'laysiz."
                    : "Yetkazib berishda naqd to'laysiz."}
        </div>
        <div class="success-id">#${orderId}</div>
        <div style="margin-top:8px;font-size:14px;color:var(--text2)">
          Jami: <b>${formatPrice(finalTotal)}</b>
          ${finalDeliveryFee ? `(${formatPrice(finalDeliveryFee)} yetkazish narxi bilan)` : ''}
        </div>
        <button class="order-btn" style="margin-top:24px" onclick="closeModal()">
          Davom etish
        </button>
      </div>`;
                    
                    if (tg) setTimeout(() => tg.close(), 5000);
                } catch (e) {
                    btn.disabled = false;
                    btn.textContent = `Buyurtma berish — ${formatPrice(getCartTotal())}`;
                    showToast('Xato yuz berdi. Qaytadan urinib ko\'ring.');
                }
            }
            
            // ===== TOAST =====
            function showToast(msg) {
                const el = document.getElementById('toast');
                el.textContent = msg;
                el.classList.add('show');
                setTimeout(() => el.classList.remove('show'), 2000);
            }
            
            // ===== INIT =====
            loadMenu();
        </script>
    </body>
    </html>
